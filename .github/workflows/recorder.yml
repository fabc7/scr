name: Record Stream

on:
  workflow_dispatch:
    inputs:
      stream_url:
        description: 'Profile URL to record'
        required: true

jobs:
  record-stream:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium --with-deps

      - name: Run recording script
        env:
          STREAM_URL: ${{ github.event.inputs.stream_url }}
        run: python recorder/recorder.py

      - name: Upload recorded video
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Recorded-Stream
          path: "**/*.mp4"
          retention-days: 7
